services:
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama:/root/.ollama"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bg
      POSTGRES_PASSWORD: bg
      POSTGRES_DB: boardgames
    ports: ["5434:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

volumes:
  ollama:
  pgdata:
